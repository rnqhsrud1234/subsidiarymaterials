<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>후드 설치 부자재</title>

<!-- Supabase 클라이언트 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  body { font-family: Arial, sans-serif; background: #f4f6f8; }
  .container { max-width: 1000px; margin: 20px auto; background: #fff; padding: 20px; }
  h3 { margin-bottom: 8px; }
  .note { font-size: 12px; color: #666; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { border: 1px solid #000; padding: 8px; text-align: center; }
  th { background: #1f3a5a; color: #fff; font-weight: normal; }
  .left { text-align: left; }
  input[type="number"] { width: 70px; padding: 4px; text-align: center; }
  .total { background: #e6e6e6; font-weight: bold; }
  .top-buttons { margin-bottom: 15px; }
  .top-buttons button { margin-right: 8px; padding: 8px 14px; font-size: 13px; background: #1f3a5a; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  .top-buttons button:hover { background: #16304a; }
  .top-buttons button:disabled { background: #ccc; cursor: not-allowed; }
  .btn-save { background: #28a745 !important; }
  .btn-save:hover { background: #218838 !important; }
  .btn-logout { background: #6c757d !important; }
  .btn-logout:hover { background: #5a6268 !important; }
  .highlight-yellow { background: #e9ecef !important; color: #000 !important; }
</style>
</head>
<body>
<div class="container">
  <h3>후드 설치 부자재</h3>
  <p class="note">※ 서비스봉투는 묶음 단위로, 폼테이프는 세트 단위로 기재요청.</p>

  <div class="top-buttons">
    <button type="button" class="btn-save" id="saveBtn" onclick="saveData()">저장</button>
    <button type="button" onclick="goPage('user_input.html')">부자재 신청으로</button>
    <button type="button" class="btn-logout" onclick="logout()">로그아웃</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>지점명</th>
        <th>PB-1 세정제 (600ml)</th>
        <th>은박테이프</th>
        <th>알루미늄 후렉시블<br>(100mm×10M)</th>
        <th>환기자재 레듀샤<br>(125mm-100mm)</th>
        <th class="highlight-yellow">서비스봉투<br>(100EA, 1묶음)</th>
        <th class="highlight-yellow">전기레인지 폼테이프<br>(4EA, 1SET)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="left" id="branchName"></td>
        <td><input type="number" id="pb1" min="0" value="0"></td>
        <td><input type="number" id="tape" min="0" value="0"></td>
        <td><input type="number" id="flex" min="0" value="0"></td>
        <td><input type="number" id="reducer" min="0" value="0"></td>
        <td class="highlight-yellow"><input type="number" id="serviceBag" min="0" value="0"></td>
        <td class="highlight-yellow"><input type="number" id="formTape" min="0" value="0"></td>
      </tr>
      <tr class="total">
        <td class="left">합계</td>
        <td id="sumPb1">0</td>
        <td id="sumTape">0</td>
        <td id="sumFlex">0</td>
        <td id="sumReducer">0</td>
        <td class="highlight-yellow" id="sumServiceBag">0</td>
        <td class="highlight-yellow" id="sumFormTape">0</td>
      </tr>
    </tbody>
  </table>
</div>

<script>
// Supabase 설정
const SUPABASE_URL = 'https://yhuvkxuzolhpnzzbpigr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Ka0LELW2NrPf3q3dyO1Usg_EHYTS31K';

var supabaseClient = null;

document.addEventListener('DOMContentLoaded', function() {
  // Supabase 초기화
  if (typeof window.supabase !== 'undefined') {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('✅ Supabase 초기화 완료');
  } else {
    console.error('❌ Supabase 라이브러리 로드 실패');
  }

  const role = localStorage.getItem('loginRole');
  if (role !== 'user') {
    alert('접근 권한이 없습니다.');
    location.href = 'login.html';
    return;
  }
  
  const branchName = localStorage.getItem('loginBranch');
  if (!branchName) {
    alert('지점 정보를 불러올 수 없습니다.');
    location.href = 'login.html';
    return;
  }

  document.getElementById('branchName').textContent = branchName;

  loadData();
  // 마감 상태 확인
  checkAndApplyDeadlock();
  document.querySelectorAll('input[type="number"]').forEach(function(inp) {
    inp.addEventListener('input', calcSum);
  });
});

function calcSum() {
  const pb1 = parseInt(document.getElementById('pb1').value, 10) || 0;
  const tape = parseInt(document.getElementById('tape').value, 10) || 0;
  const flex = parseInt(document.getElementById('flex').value, 10) || 0;
  const reducer = parseInt(document.getElementById('reducer').value, 10) || 0;
  const serviceBag = parseInt(document.getElementById('serviceBag').value, 10) || 0;
  const formTape = parseInt(document.getElementById('formTape').value, 10) || 0;

  document.getElementById('sumPb1').textContent = pb1;
  document.getElementById('sumTape').textContent = tape;
  document.getElementById('sumFlex').textContent = flex;
  document.getElementById('sumReducer').textContent = reducer;
  document.getElementById('sumServiceBag').textContent = serviceBag;
  document.getElementById('sumFormTape').textContent = formTape;
}

async function loadData() {
  const userId = localStorage.getItem('userId');
  const branchId = localStorage.getItem('loginId');
  
  if (!userId || !branchId || !supabaseClient) return;

  const now = new Date();
  const year = now.getFullYear().toString().slice(-2);
  const month = now.getMonth() + 1;

  try {
    const { data, error } = await supabaseClient
      .from('hood_applications')
      .select('*')
      .eq('branch_id', branchId)
      .eq('year', year)
      .eq('month', month)
      .single();

    if (error && error.code !== 'PGRST116') {
      console.error('불러오기 오류:', error);
      return;
    }

    if (!data) {
      console.log('저장된 데이터 없음');
      calcSum();
      return;
    }

    console.log('✅ 데이터 불러오기 성공');
    
    document.getElementById('pb1').value = data.pb1 || 0;
    document.getElementById('tape').value = data.tape || 0;
    document.getElementById('flex').value = data.flex || 0;
    document.getElementById('reducer').value = data.reducer || 0;
    document.getElementById('serviceBag').value = data.service_bag || 0;
    document.getElementById('formTape').value = data.form_tape || 0;

    calcSum();
  } catch (error) {
    console.error('불러오기 오류:', error);
  }
}

async function saveData() {
  const userId = localStorage.getItem('userId');
  const branchId = localStorage.getItem('loginId');
  const branchName = localStorage.getItem('loginBranch');
  const saveBtn = document.getElementById('saveBtn');
  
  if (!userId || !branchId) {
    alert('로그인 정보가 없습니다.');
    return;
  }

  if (!supabaseClient) {
    alert('Supabase가 초기화되지 않았습니다. 페이지를 새로고침해주세요.');
    return;
  }

  const now = new Date();
  const year = now.getFullYear().toString().slice(-2);
  const month = now.getMonth() + 1;

  const payload = {
    user_id: userId,
    branch_id: branchId,
    branch_name: branchName || '',
    year: year,
    month: month,
    pb1: parseInt(document.getElementById('pb1').value, 10) || 0,
    tape: parseInt(document.getElementById('tape').value, 10) || 0,
    flex: parseInt(document.getElementById('flex').value, 10) || 0,
    reducer: parseInt(document.getElementById('reducer').value, 10) || 0,
    service_bag: parseInt(document.getElementById('serviceBag').value, 10) || 0,
    form_tape: parseInt(document.getElementById('formTape').value, 10) || 0
  };

  saveBtn.disabled = true;
  saveBtn.textContent = '저장 중...';

  try {
    const { data, error } = await supabaseClient
      .from('hood_applications')
      .upsert(payload, { onConflict: 'branch_id,year,month' });

    if (error) throw error;

    console.log('✅ 저장 완료');
    alert('저장되었습니다.');
  } catch (error) {
    console.error('저장 오류:', error);
    alert('저장 중 오류가 발생했습니다: ' + error.message);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '저장';
  }
}

function goPage(url) { 
  location.href = url; 
}

function logout() {
  localStorage.clear();
  location.href = 'login.html';
}

async function checkAndApplyDeadlock() {
  if (!supabaseClient) return;
  try {
    const { data } = await supabaseClient
      .from('settings')
      .select('value')
      .eq('key', 'is_closed')
      .single();

    if (data && data.value === 'true') applyLock();
  } catch (e) {
    console.warn('마감 상태 확인 실패:', e);
  }
}

function applyLock() {
  document.querySelectorAll('input[type="number"]').forEach(function(inp) {
    inp.disabled = true;
    inp.style.backgroundColor = '#e0e0e0';
    inp.style.cursor = 'not-allowed';
  });
  const saveBtn = document.getElementById('saveBtn');
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.style.opacity = '0.5';
    saveBtn.style.cursor = 'not-allowed';
    saveBtn.title = '마감되어 저장할 수 없습니다.';
  }
  const banner = document.createElement('div');
  banner.style.cssText = 'background:#dc3545; color:white; text-align:center; padding:10px; font-size:14px; font-weight:bold; margin-bottom:10px; border-radius:4px;';
  banner.textContent = '🔒 신청이 마감되었습니다. 현재 입력 및 수정이 불가합니다.';
  const container = document.querySelector('.container');
  const h3 = container.querySelector('h3');
  container.insertBefore(banner, h3);
}
</script>
</body>
</html>
