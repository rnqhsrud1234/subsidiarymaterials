<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>부자재 취합 시스템 - 로그인</title>
    
    <!-- Supabase 클라이언트 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            width: 360px;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-box label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .login-box input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: #2c7be5;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #1a68d1;
        }
        
        .login-box button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .footer-text {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        
        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>부자재 취합 시스템</h2>

    <form onsubmit="login(event)">
        <label>아이디</label>
        <input type="text" id="userid" placeholder="설치법인 SA코드" required>

        <label>비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호" required>

        <button type="submit" id="loginBtn">로그인</button>
    </form>
    
    <div id="errorMessage" class="error-message"></div>

    <div class="footer-text">
        © 부자재 관리 시스템
    </div>
</div>

<script>
// Supabase 설정
const SUPABASE_URL = 'https://yhuvkxuzolhpnzzbpigr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Ka0LELW2NrPf3q3dyO1Usg_EHYTS31K';

// 전역 변수로 supabase 선언
var supabaseClient = null;

// 페이지 로드 시 Supabase 초기화
window.addEventListener('DOMContentLoaded', function() {
  if (typeof window.supabase !== 'undefined') {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('✅ Supabase 초기화 완료');
  } else {
    console.error('❌ Supabase 라이브러리 로드 실패');
    document.getElementById('errorMessage').textContent = 'Supabase 라이브러리 로드 실패';
  }
});

// 로그인 함수
async function login(e) {
  e.preventDefault();

  const username = document.getElementById('userid').value.trim();
  const password = document.getElementById('password').value.trim();
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMessage');
  
  errorMsg.textContent = '';

  if (!username || !password) {
    errorMsg.textContent = '아이디와 비밀번호를 모두 입력하세요.';
    return;
  }

  if (!supabaseClient) {
    errorMsg.textContent = 'Supabase가 초기화되지 않았습니다. 페이지를 새로고침해주세요.';
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = '로그인 중...';

  try {
    const { data: users, error } = await supabaseClient
      .from('users')
      .select('*')
      .eq('username', username)
      .single();

    if (error) {
      console.error('조회 오류:', error);
      errorMsg.textContent = '존재하지 않는 계정입니다.';
      return;
    }

    if (!users) {
      errorMsg.textContent = '존재하지 않는 계정입니다.';
      return;
    }

    if (users.password !== password) {
      errorMsg.textContent = '비밀번호가 올바르지 않습니다.';
      return;
    }

    localStorage.setItem('loginId', users.username);
    localStorage.setItem('loginBranch', users.branch_name);
    localStorage.setItem('loginRole', users.role);
    localStorage.setItem('userId', users.id);
    localStorage.setItem('userAcct', users.acct || 0);
    localStorage.setItem('userTo', users.to_count || 0);

    console.log('✅ 로그인 성공:', users.username);

    if (users.role === 'admin') {
      location.href = 'admin.html';
    } else {
      location.href = 'user_input.html';
    }

  } catch (err) {
    console.error('로그인 오류:', err);
    errorMsg.textContent = '로그인 중 오류가 발생했습니다: ' + err.message;
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = '로그인';
  }
}

// 자동 리다이렉트 제거 (매번 로그인하도록 변경)
// 만약 자동 로그인을 원하시면 아래 주석을 해제하세요
/*

  const role = localStorage.getItem('loginRole');
  if (role === 'admin') {
    location.href = 'admin.html';
  } else {
    location.href = 'user_input.html';
  }
}
*/

</script>

</body>
</html>
